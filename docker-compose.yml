version: '3.8'

services:
  app:
    build: ./backend
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
